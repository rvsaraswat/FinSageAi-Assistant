version: '3.8'

services:
  finsageai:
    build: .
    container_name: finsageai-assistant
    ports:
      - "15600:15600"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=15600
      - OLLAMA_URL=http://host.docker.internal:11434
      # Set these to override values from .env:
      # - APP_SECRET=change-this-to-a-random-64-char-hex-string
      # - CORS_ORIGIN=https://yourdomain.com
      # - ADMIN_TOKEN=change-this-to-a-secure-random-token
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:15600/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
